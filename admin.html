<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chile Parts | Panel Admin</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#CC0000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CP Admin">
<link rel="apple-touch-icon" href="/admin-icon.svg">
<style>
:root{--r:#CC0000;--n:#0a0a0a;--g:#1a1a1a;--b:#2a2a2a;--w:#fff;--gt:#999}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--n);color:var(--w);font-family:'Segoe UI',Arial,sans-serif;min-height:100vh}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.lbox{background:var(--g);border:1px solid var(--b);border-top:3px solid var(--r);padding:48px 40px;width:100%;max-width:400px;border-radius:4px}
.llogo{font-size:28px;font-weight:900;letter-spacing:2px;margin-bottom:8px}
.llogo span{color:var(--r)}
.lsub{font-size:12px;color:var(--gt);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
label{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gt);display:block;margin-bottom:6px}
input[type=password],input[type=text],input[type=email]{width:100%;background:#111;border:1px solid var(--b);color:var(--w);padding:12px 14px;font-size:15px;border-radius:3px;outline:none;margin-bottom:16px;display:block}
input[type=password]:focus,input[type=text]:focus,input[type=email]:focus{border-color:var(--r)}
.btnl{width:100%;background:var(--r);color:#fff;border:none;padding:14px;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:3px;margin-bottom:12px}
.btnl:hover{background:#aa0000}
.msg{padding:10px 14px;border-radius:3px;font-size:13px;margin-bottom:10px;display:none}
.msg.ok{background:#0d3320;border:1px solid #4caf50;color:#4caf50}
.msg.err{background:#2a0a0a;border:1px solid #ff6666;color:#ff6666}
.msg.info{background:#1a2a3a;border:1px solid #5aafff;color:#5aafff}
#app{display:none}
.topbar{background:var(--g);border-bottom:1px solid var(--b);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.tlogo{font-size:20px;font-weight:900;letter-spacing:2px}
.tlogo span{color:var(--r)}
.tright{display:flex;align-items:center;gap:16px}
.sync{font-size:13px;color:var(--gt)}
.btnout{background:none;border:1px solid var(--b);color:var(--gt);padding:6px 14px;font-size:12px;cursor:pointer;border-radius:3px}
.btnout:hover{border-color:#555;color:var(--w)}
.sbar{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--b);border-bottom:1px solid var(--b)}
.stat{background:var(--g);padding:20px 24px;text-align:center}
.sn{font-size:36px;font-weight:900;color:var(--r);line-height:1}
.sl{font-size:11px;color:var(--gt);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.toolbar{padding:16px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--b)}
.chip{padding:6px 14px;border:1px solid var(--b);border-radius:20px;font-size:12px;cursor:pointer;color:var(--gt);background:none;letter-spacing:1px;transition:all .15s}
.chip:hover,.chip.on{border-color:var(--r);color:var(--w);background:rgba(204,0,0,.1)}
.btnn{margin-left:auto;background:var(--r);color:#fff;border:none;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;border-radius:3px}
.btnn:hover{background:#aa0000}
.twrap{overflow-x:auto;padding:0 24px 24px}
table{width:100%;border-collapse:collapse;margin-top:16px;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--gt);font-size:11px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--b);white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid #1a1a1a;vertical-align:top}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.bweb{background:#1a3a5c;color:#5aafff}.bwa{background:#0d3320;color:#25D366}.big{background:#3a1040;color:#e040fb}
.bpenv{background:#3a2a00;color:#f0a000}.benv{background:#1a2a4a;color:#5aafff}
.bpag{background:#0d3320;color:#4caf50}.bnopag{background:#3a0a0a;color:#ff6666}
.bsp{background:#2a2a2a;color:#aaa}.bprov{background:#1a3a5c;color:#5aafff}
.bped{background:#3a2a00;color:#f0a000}.btra{background:#1a2a3a;color:#29b6f6}
.badu{background:#3a1a00;color:#ff9800}.blis{background:#1a3a1a;color:#66bb6a}.bent{background:#0d3320;color:#4caf50}
.br{background:none;border:1px solid var(--b);color:var(--gt);padding:4px 10px;font-size:11px;cursor:pointer;border-radius:3px;margin-bottom:3px;display:block;width:100%}
.br:hover{border-color:#555;color:var(--w)}
.bdel{border-color:#3a0a0a;color:#ff6666}.bdel:hover{border-color:var(--r);background:rgba(204,0,0,.1)}
.drow{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 0;border-top:1px solid var(--b)}
.drow:first-child{border-top:none}.dfull{grid-column:1/-1}
.dlabel{font-size:11px;color:var(--gt);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
select.inl,input.inl{background:#111;border:1px solid var(--b);color:var(--w);padding:7px 10px;font-size:13px;border-radius:3px;width:100%;outline:none;margin-bottom:5px}
select.inl:focus,input.inl:focus{border-color:var(--r)}
textarea.inl{background:#111;border:1px solid var(--b);color:var(--w);padding:7px 10px;font-size:13px;border-radius:3px;width:100%;outline:none;min-height:60px;resize:vertical}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;overflow-y:auto;padding:40px 20px}
.mbg.show{display:block}
.modal{background:var(--g);border:1px solid var(--b);border-top:3px solid var(--r);padding:32px;width:100%;max-width:560px;border-radius:4px;margin:0 auto}
.modal h2{font-size:18px;font-weight:700;margin-bottom:20px}
.frow{margin-bottom:12px}
.frow label{display:block;font-size:11px;color:var(--gt);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.frow input,.frow select,.frow textarea{width:100%;background:#111;border:1px solid var(--b);color:var(--w);padding:9px 12px;font-size:13px;border-radius:3px;outline:none}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:var(--r)}
.frow textarea{min-height:72px;resize:vertical}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.srctabs{display:flex;gap:6px;margin-bottom:14px}
.sbtn{flex:1;padding:8px;border:1px solid var(--b);border-radius:3px;font-size:13px;cursor:pointer;background:none;color:var(--gt);text-align:center}
.sbtn.on{background:rgba(204,0,0,.15);border-color:var(--r);color:var(--w)}
.mact{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.btncanc{background:none;border:1px solid var(--b);color:var(--gt);padding:9px 20px;font-size:13px;cursor:pointer;border-radius:3px}
.empty{text-align:center;padding:60px;color:var(--gt);font-size:14px}
.abar{padding:10px 24px;font-size:13px;display:none}
.abar.ok{background:#0d3320;color:#4caf50}.abar.err{background:#2a0a0a;color:#ff6666}
@media(max-width:768px){.sbar{grid-template-columns:repeat(2,1fr)}.fgrid{grid-template-columns:1fr}.drow{grid-template-columns:1fr}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<div id="login">
  <div class="lbox">
    <div class="llogo">CHILE<span>PARTS</span></div>
    <div class="lsub">Panel de Administración</div>

    <div class="msg err" id="msg-err"></div>
    <div class="msg ok" id="msg-ok"></div>
    <div class="msg info" id="msg-info"></div>

    <label>Email</label>
    <input type="email" id="email" placeholder="correo@ejemplo.com">
    <label>Contraseña</label>
    <input type="password" id="pwd" placeholder="Ingresa tu contraseña">
    <button class="btnl" id="btnLogin">Ingresar al Panel</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tlogo">CHILE<span>PARTS</span>&nbsp;<span style="font-size:13px;font-weight:400;color:var(--gt)">Panel Admin</span></div>
    <div class="tright">
      <span class="sync" id="sync">● Conectando...</span>
      <button class="btnout" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="abar" id="abar"></div>
  <div class="sbar">
    <div class="stat"><div class="sn" id="s0">—</div><div class="sl">Total</div></div>
    <div class="stat"><div class="sn" id="s1">—</div><div class="sl">Pend. enviar</div></div>
    <div class="stat"><div class="sn" id="s2">—</div><div class="sl">Cot. enviadas</div></div>
    <div class="stat"><div class="sn" id="s3">—</div><div class="sl">En tránsito</div></div>
    <div class="stat"><div class="sn" id="s4">—</div><div class="sl">Saldo pendiente</div></div>
  </div>
  <div class="toolbar">
    <button class="chip on" onclick="sf('all',this)">Todas</button>
    <button class="chip" onclick="sf('pendiente_enviar',this)">⏳ Pend. enviar</button>
    <button class="chip" onclick="sf('cotizacion_enviada',this)">✓ Enviadas</button>
    <button class="chip" onclick="sf('en_transito',this)">🚢 En tránsito</button>
    <button class="chip" onclick="sf('entregado',this)">✅ Entregadas</button>
    <button class="chip" onclick="sf('web',this)">🌐 Web</button>
    <button class="chip" onclick="sf('whatsapp',this)">📱 WhatsApp</button>
    <button class="chip" onclick="sf('instagram',this)">📸 Instagram</button>
    <button class="btnn" onclick="openM()">+ Nueva cotización</button>
  </div>
  <div class="twrap">
    <div class="empty" id="tbl-status">Cargando...</div>
    <table id="tbl" style="display:none">
      <thead><tr>
        <th>#</th><th>Fecha</th><th>Cliente</th><th>Vehículo</th><th>Repuesto</th>
        <th>Fuente</th><th>Cotización</th><th>Pedido</th><th>50% ini</th><th>Saldo</th><th>Acciones</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div class="mbg" id="modal">
  <div class="modal">
    <h2>Nueva cotización</h2>
    <div class="srctabs">
      <button class="sbtn on" onclick="setSrc('web',this)">🌐 Web</button>
      <button class="sbtn" onclick="setSrc('whatsapp',this)">📱 WhatsApp</button>
      <button class="sbtn" onclick="setSrc('instagram',this)">📸 Instagram</button>
    </div>
    <input type="hidden" id="fsrc" value="web">
    <div class="fgrid">
      <div class="frow"><label>Nombre *</label><input id="fn" placeholder="Nombre cliente"></div>
      <div class="frow"><label>Teléfono</label><input id="ft" placeholder="+56 9 XXXX XXXX"></div>
    </div>
    <div class="frow"><label>Email</label><input id="fe" type="email" placeholder="correo@ejemplo.com"></div>
    <div class="fgrid">
      <div class="frow"><label>Marca</label><input id="fm" placeholder="BMW, Mercedes..."></div>
      <div class="frow"><label>Modelo</label><input id="fmo" placeholder="E36 328, C63..."></div>
    </div>
    <div class="fgrid">
      <div class="frow"><label>Año</label><input id="fa" placeholder="1997"></div>
      <div class="frow"><label>VIN</label><input id="fv" placeholder="Opcional"></div>
    </div>
    <div class="frow"><label>Tipo vehículo</label>
      <select id="ftp"><option value="">Selecciona...</option>
        <option>Auto Alta Gama</option><option>Auto Clásico / Colección</option>
        <option>Automóvil / Camioneta</option><option>Motocicleta</option><option>Otro</option>
      </select>
    </div>
    <div class="frow"><label>Repuesto *</label><textarea id="fr" placeholder="Describe la pieza..."></textarea></div>
    <div class="frow"><label>Nota interna</label><textarea id="fni" placeholder="Solo visible para ti..." style="min-height:50px"></textarea></div>
    <div class="mact">
      <button class="btncanc" onclick="closeM()">Cancelar</button>
      <button class="btnn" id="btnSave" onclick="saveNew()">Guardar cotización</button>
    </div>
  </div>
</div>

<script>
const SU='https://cgsbrbwfsenidwrjekyk.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNnc2JyYndmc2VuaWR3cmpla3lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTcxMTQsImV4cCI6MjA5NDI3MzExNH0.awEZdfKi353WGDmag0qFhAGR1eXXZtoLZSnVkb4NG74';
const TB='cotizaciones';
const sb=supabase.createClient(SU,SK);
let data=[],filter='all',expanded=null,_session=null;

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    _session=session;
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    load();
  }
})();

function showMsg(id,txt){
  ['msg-info','msg-err','msg-ok'].forEach(x=>{document.getElementById(x).style.display='none';});
  const el=document.getElementById(id);
  el.textContent=txt;
  el.style.display='block';
}

function showAlert(txt,isErr){
  const a=document.getElementById('abar');
  a.textContent=txt;
  a.className='abar '+(isErr?'err':'ok');
  a.style.display='block';
  setTimeout(()=>a.style.display='none',4000);
}

document.getElementById('btnLogin').addEventListener('click',async function(){
  const email=document.getElementById('email').value.trim();
  const pwd=document.getElementById('pwd').value;
  if(!email||!pwd){showMsg('msg-err','Completa email y contraseña');return;}
  this.textContent='Ingresando...';this.disabled=true;
  const{data:d,error}=await sb.auth.signInWithPassword({email,password:pwd});
  this.textContent='Ingresar al Panel';this.disabled=false;
  if(error){showMsg('msg-err','Credenciales incorrectas');return;}
  _session=d.session;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  load();
});

document.getElementById('pwd').addEventListener('keydown',function(e){
  if(e.key==='Enter') document.getElementById('btnLogin').click();
});

async function doLogout(){
  await sb.auth.signOut();
  _session=null;
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('email').value='';
  document.getElementById('pwd').value='';
  showMsg('msg-info','Sesión cerrada');
}

async function api(method,path,body){
  const token=_session?.access_token;
  const opts={method,headers:{
    'apikey':SK,'Authorization':'Bearer '+token,'Content-Type':'application/json',
    'Prefer':method==='POST'?'return=representation':'return=minimal'
  }};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(SU+'/rest/v1/'+path,opts);
  const txt=await r.text();
  if(!r.ok) throw new Error('HTTP '+r.status+': '+txt.slice(0,200));
  if(r.status===204||!txt) return null;
  return JSON.parse(txt);
}

async function load(){
  const sync=document.getElementById('sync');
  sync.textContent='⟳ Cargando...';
  sync.style.color='var(--gt)';
  try{
    data=await api('GET',TB+'?order=created_at.desc&limit=500')||[];
    sync.style.color='#4caf50';
    sync.textContent='● Conectado ('+data.length+' registros)';
    render();
  }catch(e){
    sync.style.color='#ff6666';
    sync.textContent='⚠ Error';
    document.getElementById('tbl-status').textContent='Error: '+e.message;
    document.getElementById('tbl-status').style.display='block';
    console.error(e);
  }
}

function sf(f,el){filter=f;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');render();}

function getFiltered(){
  if(filter==='all') return data;
  if(['web','whatsapp','instagram'].includes(filter)) return data.filter(d=>d.fuente===filter);
  if(['pendiente_enviar','cotizacion_enviada'].includes(filter)) return data.filter(d=>d.estado_cotizacion===filter);
  return data.filter(d=>d.estado_pedido===filter);
}

function b(cls,txt){return '<span class="badge '+cls+'">'+txt+'</span>';}
function bfuente(f){return f==='whatsapp'?b('bwa','📱 WA'):f==='instagram'?b('big','📸 IG'):b('bweb','🌐 Web');}
function bcot(s){return s==='cotizacion_enviada'?b('benv','✓ Enviada'):b('bpenv','⏳ Pend. enviar');}
function bped(s){
  const m={sin_pedido:['bsp','—'],buscando_proveedor:['bsp','🔍 Buscando'],
    proveedor_confirmado:['bprov','✓ Proveedor'],pedido_realizado:['bped','📋 Realizado'],
    en_transito:['btra','🚢 Tránsito'],en_aduana:['badu','🛃 Aduana'],
    listo_entrega:['blis','📦 Listo'],entregado:['bent','✅ Entregado']};
  const v=m[s]||['bsp','—']; return b(v[0],v[1]);
}
function bpago(s){return s==='pagado'?b('bpag','✓ Pagado'):b('bnopag','⏳ Pendiente');}
function fdate(d){try{return new Date(d).toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'2-digit'});}catch(e){return '';}}

function sel(field,id,val,opts){
  return '<select class="inl" onchange="upd('+id+',\''+field+'\',this.value)">'+
    opts.map(o=>'<option value="'+o[0]+'"'+(val===o[0]?' selected':'')+'>'+o[1]+'</option>').join('')+'</select>';
}

function detailHTML(q){
  return '<tr id="det-'+q.id+'"><td colspan="11" style="padding:16px 20px;background:rgba(204,0,0,.03)">'
    +'<div class="drow"><div><div class="dlabel">Estado cotización</div>'
    +sel('estado_cotizacion',q.id,q.estado_cotizacion,[['pendiente_enviar','⏳ Pendiente de enviar'],['cotizacion_enviada','✓ Cotización enviada']])
    +'</div><div><div class="dlabel">Estado pedido</div>'
    +sel('estado_pedido',q.id,q.estado_pedido,[['sin_pedido','— Sin pedido'],['buscando_proveedor','🔍 Buscando proveedor'],
      ['proveedor_confirmado','✓ Proveedor confirmado'],['pedido_realizado','📋 Pedido realizado'],
      ['en_transito','🚢 En tránsito'],['en_aduana','🛃 En aduana'],['listo_entrega','📦 Listo'],['entregado','✅ Entregado']])
    +'</div></div>'
    +'<div class="drow"><div><div class="dlabel">Pago inicial 50%</div>'
    +sel('pago_inicial',q.id,q.pago_inicial,[['pendiente','⏳ Pendiente'],['pagado','✓ Pagado']])
    +sel('pago_inicial_medio',q.id,q.pago_inicial_medio||'',[['','Medio...'],['transferencia','🏦 Transferencia'],['flow','Flow']])
    +'</div><div><div class="dlabel">Saldo final 50%</div>'
    +sel('pago_final',q.id,q.pago_final,[['pendiente','⏳ Pendiente'],['pagado','✓ Pagado']])
    +sel('pago_final_medio',q.id,q.pago_final_medio||'',[['','Medio...'],['transferencia','🏦 Transferencia'],['flow','Flow']])
    +'</div></div>'
    +'<div class="drow"><div><div class="dlabel">Courier</div>'
    +sel('courier',q.id,q.courier||'',[['','Sin asignar'],['Chile Express','Chile Express'],['Starken','Starken'],['Retiro en Santiago','Retiro Santiago'],['Otro','Otro']])
    +'</div><div><div class="dlabel">N° Tracking</div>'
    +'<input class="inl" value="'+(q.tracking||'')+'" placeholder="Número seguimiento" onblur="upd('+q.id+',\'tracking\',this.value)"></div></div>'
    +'<div class="drow"><div><div class="dlabel">Fecha estimada</div>'
    +'<input class="inl" type="date" value="'+(q.fecha_estimada||'')+'" onchange="upd('+q.id+',\'fecha_estimada\',this.value)"></div>'
    +'<div><div class="dlabel">Repuesto</div><div style="font-size:13px;color:#ccc;line-height:1.5">'+q.repuesto+'</div></div></div>'
    +'<div class="drow"><div class="dfull"><div class="dlabel">Nota interna</div>'
    +'<textarea class="inl" onblur="upd('+q.id+',\'nota_interna\',this.value)">'+(q.nota_interna||'')+'</textarea></div></div>'
    +'</td></tr>';
}

function render(){
  const rows=getFiltered();
  document.getElementById('s0').textContent=data.length;
  document.getElementById('s1').textContent=data.filter(d=>d.estado_cotizacion==='pendiente_enviar').length;
  document.getElementById('s2').textContent=data.filter(d=>d.estado_cotizacion==='cotizacion_enviada').length;
  document.getElementById('s3').textContent=data.filter(d=>d.estado_pedido==='en_transito').length;
  document.getElementById('s4').textContent=data.filter(d=>d.pago_final==='pendiente'&&d.estado_pedido!=='sin_pedido').length;
  const tbl=document.getElementById('tbl');
  const status=document.getElementById('tbl-status');
  if(!rows.length){status.textContent='Sin resultados para este filtro';status.style.display='block';tbl.style.display='none';return;}
  status.style.display='none';tbl.style.display='table';
  document.getElementById('tbody').innerHTML=rows.map(q=>{
    const isExp=expanded===q.id;
    const row='<tr style="'+(isExp?'background:rgba(204,0,0,.04)':'')+'">'
      +'<td style="color:var(--gt);font-size:12px">#'+q.id+'</td>'
      +'<td style="white-space:nowrap;color:var(--gt)">'+fdate(q.created_at)+'</td>'
      +'<td><div style="font-weight:600">'+q.nombre+'</div>'
      +(q.telefono?'<div style="font-size:12px;color:var(--gt)">'+q.telefono+'</div>':'')
      +(q.email?'<div style="font-size:12px;color:var(--gt)">'+q.email+'</div>':'')+'</td>'
      +'<td><div style="font-weight:600">'+(q.marca||'')+' '+(q.modelo||'')+'</div>'
      +'<div style="font-size:12px;color:var(--gt)">'+(q.anio||'')+(q.vin?' · '+q.vin:'')+'</div></td>'
      +'<td><div style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+q.repuesto+'">'+q.repuesto+'</div></td>'
      +'<td>'+bfuente(q.fuente)+'</td><td>'+bcot(q.estado_cotizacion)+'</td>'
      +'<td>'+bped(q.estado_pedido)+'</td><td>'+bpago(q.pago_inicial)+'</td><td>'+bpago(q.pago_final)+'</td>'
      +'<td><button class="br" onclick="toggleExp('+q.id+')">'+(isExp?'▲ Cerrar':'▼ Ver detalle')+'</button>'
      +'<button class="br bdel" onclick="del('+q.id+')">✕ Eliminar</button></td></tr>';
    return row+(isExp?detailHTML(q):'');
  }).join('');
}

function toggleExp(id){expanded=expanded===id?null:id;render();}

async function upd(id,field,value){
  try{
    await api('PATCH',TB+'?id=eq.'+id,{[field]:value});
    const item=data.find(d=>d.id===id);
    if(item) item[field]=value;
    render();showAlert('✓ Guardado',false);
  }catch(e){showAlert('Error: '+e.message,true);}
}

async function del(id){
  if(!confirm('¿Eliminar permanentemente?')) return;
  try{
    await api('DELETE',TB+'?id=eq.'+id);
    data=data.filter(d=>d.id!==id);
    if(expanded===id) expanded=null;
    render();showAlert('Cotización eliminada',false);
  }catch(e){showAlert('Error: '+e.message,true);}
}

function setSrc(s,el){
  document.getElementById('fsrc').value=s;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}
function openM(){document.getElementById('modal').classList.add('show');}
function closeM(){
  document.getElementById('modal').classList.remove('show');
  ['fn','ft','fe','fm','fmo','fa','fv','fr','fni'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('ftp').value='';
}

async function saveNew(){
  const nombre=document.getElementById('fn').value.trim();
  const repuesto=document.getElementById('fr').value.trim();
  if(!nombre||!repuesto){alert('Nombre y repuesto son obligatorios');return;}
  const btn=document.getElementById('btnSave');
  btn.textContent='Guardando...';btn.disabled=true;
  try{
    const result=await api('POST',TB,{
      nombre,repuesto,
      telefono:document.getElementById('ft').value.trim()||null,
      email:document.getElementById('fe').value.trim()||null,
      marca:document.getElementById('fm').value.trim()||null,
      modelo:document.getElementById('fmo').value.trim()||null,
      anio:document.getElementById('fa').value.trim()||null,
      vin:document.getElementById('fv').value.trim()||null,
      tipo_vehiculo:document.getElementById('ftp').value||null,
      nota_interna:document.getElementById('fni').value.trim()||null,
      fuente:document.getElementById('fsrc').value,
      estado_cotizacion:'pendiente_enviar',estado_pedido:'sin_pedido',
      pago_inicial:'pendiente',pago_final:'pendiente'
    });
    const created=Array.isArray(result)?result[0]:result;
    if(created) data.unshift(created);
    closeM();render();showAlert('✓ Cotización guardada',false);
  }catch(e){showAlert('Error: '+e.message,true);}
  btn.textContent='Guardar cotización';btn.disabled=false;
}

setInterval(load,60000);

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
